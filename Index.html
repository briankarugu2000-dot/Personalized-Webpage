<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Personalized Webpage</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-md">

    <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">Welcome!</h1>

    <!-- Form Section -->
    <div id="form-section">
      <input
        id="nameInput"
        type="text"
        placeholder="Enter your name"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 mb-3 focus:outline-none focus:ring-2 focus:ring-blue-400"
      />
      <input
        id="ageInput"
        type="number"
        placeholder="Enter your age"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400"
      />
      <button
        onclick="saveUser()"
        class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 rounded-lg transition"
      >
        Submit
      </button>
    </div>

    <!-- Display Section (hidden until form is submitted) -->
    <div id="display-section" class="hidden mt-6 space-y-4">

      <!-- Personalized Greeting -->
      <div class="bg-blue-50 rounded-lg p-4">
        <p id="greeting" class="text-lg font-semibold text-blue-700"></p>
        <p id="age-months" class="text-sm text-gray-500 mt-1"></p>
      </div>

      <!-- Adult Content Section -->
      <div class="bg-yellow-50 rounded-lg p-4">
        <p id="content-message" class="text-gray-700"></p>
      </div>

      <!-- Motivational Quote (loop output) -->
      <div class="bg-green-50 rounded-lg p-4">
        <p class="font-semibold text-green-700 mb-2">Motivational Quotes:</p>
        <div id="quotes-container" class="space-y-1 text-gray-600 text-sm"></div>
      </div>

      <!-- Reset Button -->
      <button
        onclick="resetUser()"
        class="w-full bg-red-400 hover:bg-red-500 text-white font-semibold py-2 rounded-lg transition"
      >
        Reset
      </button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
